name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build signed APK
      env:
        SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
        SIGNING_KEY_STORE_PASSWORD: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      run: |
        cd android
        # Decode and create keystore
        echo $SIGNING_KEY_STORE_BASE64 | base64 -d > app/signing.jks
        
        # Build signed APK
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$(pwd)/app/signing.jks \
          -Pandroid.injected.signing.store.password=$SIGNING_KEY_STORE_PASSWORD \
          -Pandroid.injected.signing.key.alias=$SIGNING_KEY_ALIAS \
          -Pandroid.injected.signing.key.password=$SIGNING_KEY_PASSWORD

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-release.apk
        path: android/app/build/outputs/apk/release/app-release.apk

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: android/app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
